<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LinkUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --dark: #0F172A;
            --light: #F8FAFC;
            --text-gray: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        a { text-decoration: none; color: var(--primary); font-weight: 600; transition: 0.3s; }
        a:hover { color: #818CF8; }

        /* --- BACKGROUND DECORATION --- */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
        }

        /* --- AUTH CONTAINER --- */
        .auth-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
        }

        .logo span { color: var(--primary); }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* --- FORM ELEMENTS --- */
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        /* --- LOADING ANIMATION OVERLAY --- */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .animated-logo {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            /* This makes the logo pulse in and out smoothly */
            animation: pulseLogo 1.5s infinite ease-in-out; 
        }

        .animated-logo span {
            color: var(--primary);
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 25px rgba(79, 70, 229, 0.6); }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* --- ERROR POPUP (TOAST) --- */
        .error-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.95); /* Vibrant Red */
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            z-index: 10000;
            transform: translateX(150%); /* Hidden off-screen by default */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .error-popup.show {
            transform: translateX(0); /* Slide in */
        }

        .error-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="logo">Link<span>Up</span></div>
        <p class="subtitle">Create an account to start chatting.</p>

        <form id="register-form">
            <div class="input-group">
                <label for="register-name">Full Name</label>
                <input type="text" id="register-name" value="" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" value="" autocomplete="off" required>
            </div>
            
            <div class="input-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" value="" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn-primary" id="register-btn">Sign Up</button>
        </form>

        <p class="footer-text">Already have an account? <a href="login.html">Log in</a></p>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="animated-logo">Link<span>Up</span></div>
    </div>

    <div id="error-popup" class="error-popup">
        <span class="error-icon">⚠️</span>
        <span id="error-message">An error occurred.</span>
    </div>

    <script type="module">
        // 1. Import the connection from YOUR config file
        import { auth, db } from "./config.js";
        
        // 2. Import only the specific functions needed for registration
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const registerForm = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const errorPopup = document.getElementById('error-popup');
        const errorMessage = document.getElementById('error-message');

        // Helper function to show errors
        function showError(msg) {
            errorMessage.innerText = msg;
            errorPopup.classList.add('show');
            setTimeout(() => {
                errorPopup.classList.remove('show');
            }, 3500);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value.trim();

            // 1. Check for empty fields FIRST
            if (!name || !email || !password) {
                showError("Please fill in all fields to create an account.");
                return;
            }

            if (password.length < 6) {
                showError("Password must be at least 6 characters long.");
                return;
            }

            registerBtn.innerText = "Creating Account...";
            registerBtn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await updateProfile(user, { displayName: name });

                await setDoc(doc(db, "users", user.uid), {
                    userId: user.uid,
                    name: name,
                    email: email,
                    profileImage: "", 
                    online: true, 
                    lastSeen: serverTimestamp(),
                    createdAt: serverTimestamp()
                });

                document.getElementById('loading-overlay').classList.add('active');
                setTimeout(() => {
                    window.location.href = "chats.html"; 
                }, 2000);

            } catch (error) {
                console.error(error);
                registerBtn.innerText = "Sign Up";
                registerBtn.disabled = false;

                // 2. Handle specific Firebase errors
                if (error.code === 'auth/email-already-in-use') {
                    showError("An account with this email already exists.");
                } else if (error.code === 'auth/invalid-email') {
                    showError("Please enter a valid email address.");
                } else {
                    showError("An error occurred: " + error.message);
                }
            }
        });
    </script>

    </body>
</html>
