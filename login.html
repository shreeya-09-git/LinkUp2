<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | LinkUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --dark: #0F172A;
            --light: #F8FAFC;
            --text-gray: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        a { text-decoration: none; color: var(--primary); font-weight: 600; transition: 0.3s; }
        a:hover { color: #818CF8; }

        /* --- BACKGROUND DECORATION --- */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
        }

        /* --- AUTH CONTAINER --- */
        .auth-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
        }

        .logo span { color: var(--primary); }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* --- FORM ELEMENTS --- */
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="logo">Link<span>Up</span></div>
        <p class="subtitle">Welcome back! Please enter your details.</p>

        <form id="login-form">
            <div class="input-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>

    <script type="module">
        // 1. Import auth and your custom status function
        import { auth, updateUserStatus } from "./config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            loginBtn.innerText = "Signing In...";
            loginBtn.disabled = true;

            try {
                // A. Log the user in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // B. Trigger your global online engine
                await updateUserStatus(user.uid, true);
                
                // C. Redirect to the chat interface
                window.location.href = "chats.html"; 

            } catch (error) {
                console.error(error);
                alert("Error logging in: " + error.message);
                loginBtn.innerText = "Sign In";
                loginBtn.disabled = false;
            }
        });
    </script>

    </body>
</html>
